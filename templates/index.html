<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Thumbnail Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; margin: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05); display:flex; flex-direction:column; gap:10px; }
    .imgwrap { position: relative; width: 100%; aspect-ratio: 16/9; background: #101010; display:flex; align-items:center; justify-content:center; overflow: hidden; border-radius: 8px; }
    .imgwrap canvas { width: 100%; height: auto; display:block; }
    .row { display:flex; gap:8px; align-items:center; }
    .row label { width: 80px; font-size: 12px; color: #555; }
.row input[type=text], .row textarea { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font: inherit; }
.row textarea { resize: vertical; min-height: 3.2em; max-height: 8em; }
    .file { font-size: 12px; color: #666; word-break: break-all; }
    .status { font-size: 12px; color: #2563eb; min-height: 16px; }
  </style>
</head>
<body>
  <h1>Thumbnail Generator</h1>
  <p>Images are read from: <code>{{ culled_dir }}</code></p>
  <div class="grid">
    {% for fname in files %}
      <div class="card" data-file="{{ fname }}">
        <div class="file">{{ fname }}</div>
        <div class="imgwrap">
          <canvas class="preview" width="{{ config['target_width'] }}" height="{{ config['target_height'] }}"></canvas>
        </div>
        <div class="row">
          <label>Title</label>
          <textarea class="title" rows="3">{{ metadata[fname]['title'] or default_title(fname) }}</textarea>
        </div>
        <div class="row">
          <label>Description</label>
          <input type="text" class="desc" value="{{ metadata[fname]['desc'] }}">
        </div>
        <div class="row">
          <span class="status" aria-live="polite"></span>
        </div>
      </div>
    {% endfor %}
  </div>

<script>
const CONFIG = {{ config_json | safe }};
const imageCache = new Map();

function enc(value){
  return encodeURIComponent(value || "");
}

function bust(){
  return "cb=" + Date.now().toString(36);
}

function loadBaseImage(file){
  if (imageCache.has(file)) {
    return Promise.resolve(imageCache.get(file));
  }
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      imageCache.set(file, img);
      resolve(img);
    };
    img.onerror = () => reject(new Error(`Failed to load image ${file}`));
    img.src = `/image?file=${enc(file)}&${bust()}`;
  });
}

function rgba(arr, alpha = 1){
  if (!Array.isArray(arr) || arr.length < 3) return `rgba(255,255,255,${alpha})`;
  return `rgba(${arr[0]},${arr[1]},${arr[2]},${alpha})`;
}

function buildFont(weight, size, family){
  const fam = family ? family.split(",").map(f => f.trim().includes(" ") ? `"${f.trim()}"` : f.trim()).join(",") : "system-ui";
  return `${weight || 400} ${size || 48}px ${fam}`;
}

function drawSpacedLine(ctx, text, x, y, options){
  if (!text) return;
  const { font, fillStyle, strokeStyle, lineWidth, charSpacing } = options;
  ctx.font = font;
  ctx.fillStyle = fillStyle;
  ctx.strokeStyle = strokeStyle;
  ctx.lineWidth = lineWidth;
  ctx.textBaseline = "alphabetic";

  let cursor = x;
  const spacing = Math.max(0, charSpacing || 0);

  for (const ch of text){
    const metrics = ctx.measureText(ch);
    if (lineWidth > 0) ctx.strokeText(ch, cursor, y);
    ctx.fillText(ch, cursor, y);
    const advance = metrics.width || 0;
    cursor += advance + spacing;
  }
}

function parseFontSize(font){
  const match = /([0-9]+(?:\.[0-9]+)?)px/.exec(font);
  return match ? parseFloat(match[1]) : 48;
}

function measureBlock(ctx, lines, font, lineGap){
  if (!lines.length) return { baselines: [], totalHeight: 0 };
  ctx.font = font;
  const baselines = [];
  let cursor = 0;
  const fallback = parseFontSize(font);

  lines.forEach((line, idx) => {
    const metrics = ctx.measureText(line);
    let ascent = metrics.actualBoundingBoxAscent || 0;
    let descent = metrics.actualBoundingBoxDescent || 0;
    if (!ascent && !descent){
      ascent = fallback * 0.8;
      descent = fallback * 0.2;
    }
    const height = ascent + descent || fallback;
    const baseline = cursor + height - descent;
    baselines.push(baseline);
    cursor += height;
    if (idx < lines.length - 1) cursor += lineGap;
  });

  return { baselines, totalHeight: cursor };
}

async function renderCard(card){
  const file = card.dataset.file;
  const canvas = card.querySelector('canvas');
  const ctx = canvas.getContext('2d');
  const titleInput = card.querySelector('.title');
  const descInput = card.querySelector('.desc');
  const title = titleInput.value.trim();
  const desc = descInput.value.trim();
  const titleLines = title ? title.split(/\r?\n/) : [];
  const descLines = desc ? desc.split(/\r?\n/) : [];

  try {
    const baseImage = await loadBaseImage(file);
    const targetWidth = Number(CONFIG.target_width) || baseImage.width;
    const targetHeight = Number(CONFIG.target_height) || baseImage.height;

    if (canvas.width !== targetWidth || canvas.height !== targetHeight){
      canvas.width = targetWidth;
      canvas.height = targetHeight;
    }

    ctx.clearRect(0, 0, targetWidth, targetHeight);
    ctx.save();
    ctx.filter = 'contrast(1.05) saturate(1.1) brightness(0.9)';
    ctx.drawImage(baseImage, 0, 0, targetWidth, targetHeight);
    ctx.restore();

    const fillStyle = rgba(CONFIG.fill_color, 1);
    const strokeStyle = rgba(CONFIG.stroke_color, 1);
    const lineWidth = Number(CONFIG.stroke_width) || 0;
    const paddingLeft = Number(CONFIG.padding_left) || 48;
    const paddingBottom = Number(CONFIG.padding_bottom) || 48;
    const lineSpacing = Number(CONFIG.line_spacing) || 12;
    const charSpacing = Number(CONFIG.char_spacing) || 0;

    const titleFont = buildFont(CONFIG.title_font_weight, CONFIG.title_font_size, CONFIG.title_font_name);
    const descFont = buildFont(CONFIG.desc_font_weight, CONFIG.desc_font_size, CONFIG.desc_font_name);

    const intraLineGap = lineSpacing;
    const descBlock = measureBlock(ctx, descLines, descFont, intraLineGap);
    const titleBlock = measureBlock(ctx, titleLines, titleFont, intraLineGap);

    const blockGap = descLines.length && titleLines.length ? lineSpacing : 0;
    const blockHeight = descBlock.totalHeight + blockGap + titleBlock.totalHeight;
    const blockBottom = targetHeight - paddingBottom;
    const blockTop = blockBottom - blockHeight;

    const textOptionsTitle = {
      font: titleFont,
      fillStyle,
      strokeStyle,
      lineWidth,
      charSpacing
    };

    const textOptionsDesc = {
      font: descFont,
      fillStyle,
      strokeStyle,
      lineWidth,
      charSpacing
    };

    if (descLines.length){
      descLines.forEach((line, idx) => {
        const baseline = blockTop + descBlock.baselines[idx];
        drawSpacedLine(ctx, line, paddingLeft, baseline, textOptionsDesc);
      });
    }
    if (titleLines.length){
      const titleOffset = blockTop + descBlock.totalHeight + blockGap;
      titleLines.forEach((line, idx) => {
        const baseline = titleOffset + titleBlock.baselines[idx];
        drawSpacedLine(ctx, line, paddingLeft, baseline, textOptionsTitle);
      });
    }
  } catch (err) {
    console.error(err);
    const status = card.querySelector('.status');
    if (status) status.textContent = 'Failed to render';
  }
}

function init(){
  document.querySelectorAll('.card').forEach(card => {
    const title = card.querySelector('.title');
    const desc = card.querySelector('.desc');
    const status = card.querySelector('.status');
    const state = { timer: null, saving: false, pending: false };
    card.__state = state;

    async function saveCard(){
      if (state.saving){
        state.pending = true;
        return;
      }
      state.saving = true;
      status.textContent = 'Saving...';
      try {
        await renderCard(card);
        const canvas = card.querySelector('canvas');
        const file = card.dataset.file;
        const payload = {
          file,
          title: title.value.trim(),
          desc: desc.value.trim(),
          imageData: canvas.toDataURL('image/png')
        };
        const response = await fetch('/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok){
          throw new Error(`Save failed with status ${response.status}`);
        }
        status.textContent = 'Saved';
        setTimeout(() => { if (status.textContent === 'Saved') status.textContent = ''; }, 2000);
      } catch (error) {
        console.error(error);
        status.textContent = 'Error saving';
      } finally {
        state.saving = false;
        if (state.pending){
          state.pending = false;
          saveCard();
        }
      }
    }

    const debouncedSave = (() => {
      let handle;
      return () => {
        clearTimeout(handle);
        handle = setTimeout(saveCard, 200);
      };
    })();

    title.addEventListener('input', debouncedSave);
    desc.addEventListener('input', debouncedSave);

    saveCard();
  });
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
