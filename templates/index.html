<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>썸네일 생성기</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-variable.min.css">
  <style>
    :root {
      --bg-primary:#0a0a0a; --bg-secondary:#171717; --bg-tertiary:#262626;
      --text-primary:#fafafa; --text-secondary:#a3a3a3; --text-tertiary:#737373;
      --border-color:#2a2a2a; --accent:#ff6b7a; --accent-alpha:rgba(255,107,122,.22);
      --radius:12px;
    }
    * { box-sizing:border-box; }
    body { font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      margin:0; background:var(--bg-secondary); color:var(--text-primary); -webkit-font-smoothing:antialiased; font-weight:460; }
    header { position:sticky; top:0; z-index:10; background:var(--bg-primary); border-bottom:1px solid var(--border-color);
      padding:12px 22px; display:flex; gap:16px; align-items:center; }
    header h1 { font-size:17px; margin:0; font-weight:700; letter-spacing:-.01em; }
    header .stats { font-size:13px; color:var(--text-secondary); }
    header .stats b { color:var(--accent); }
    header .filter { margin-left:auto; padding:8px 12px; background:var(--bg-tertiary); border:1px solid var(--border-color);
      border-radius:9px; font:inherit; color:var(--text-primary); width:260px; }
    header .filter::placeholder { color:var(--text-tertiary); }
    main { padding:18px 22px 90px; display:flex; flex-direction:column; gap:14px; max-width:1400px; margin:0 auto; }
    .video { border:1px solid var(--border-color); border-radius:var(--radius); background:var(--bg-primary);
      padding:14px 16px; display:grid; grid-template-columns:1fr 380px; gap:18px; }
    .video h2 { font-size:15px; margin:0 0 10px; font-weight:720; letter-spacing:-.01em; line-height:1.35; }
    .video .vkey { font-size:11px; color:var(--text-tertiary); font-weight:400; }
    .cands { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .cand { position:relative; border:1px solid var(--border-color); border-radius:9px; overflow:hidden;
      cursor:pointer; background:var(--bg-tertiary); aspect-ratio:16/9; padding:0; transition:border-color .12s, box-shadow .12s; }
    .cand img { width:100%; height:100%; object-fit:cover; display:block; }
    .cand:hover { border-color:var(--text-tertiary); }
    .cand.sel { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-alpha); }
    .cand .tag { position:absolute; top:4px; left:4px; background:rgba(0,0,0,.55); color:#fff; font-size:10px;
      padding:1px 6px; border-radius:6px; backdrop-filter:blur(2px); }
    .side { display:flex; flex-direction:column; gap:9px; }
    .pvwrap { width:100%; aspect-ratio:16/9; background:#000; border:1px solid var(--border-color);
      border-radius:9px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .pvwrap canvas { width:100%; height:auto; display:block; }
    .pvwrap .hint { color:var(--text-tertiary); font-size:12px; }
    .side label { font-size:11px; color:var(--text-secondary); margin-bottom:-3px; }
    .side textarea, .side input[type=text] { width:100%; padding:8px 10px; background:var(--bg-tertiary);
      border:1px solid var(--border-color); border-radius:9px; font:inherit; color:var(--text-primary); }
    .side textarea { resize:vertical; min-height:3em; }
    .side textarea:focus, .side input:focus { outline:none; border-color:var(--accent); }
    .actbar { display:flex; gap:8px; align-items:center; margin-top:2px; }
    .btn { padding:8px 15px; border:1px solid var(--border-color); border-radius:9px; background:var(--bg-tertiary);
      color:var(--text-primary); font:inherit; font-weight:550; cursor:pointer; transition:filter .12s; }
    .btn:hover:not(:disabled){ filter:brightness(1.25); }
    .btn:disabled { opacity:.45; cursor:default; }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#1a0a0c; }
    .status { font-size:12px; color:var(--text-secondary); }
    .status .ok { color:var(--accent); }
    @media (max-width:780px){ .video{ grid-template-columns:1fr; } .side{ order:-1; } }
  </style>
</head>
<body>
  <header>
    <h1>썸네일 생성기</h1>
    <span class="stats"><b id="done">0</b> / <span id="total">{{ videos|length }}</span> 선택됨</span>
    <input class="filter" id="filter" type="text" placeholder="제목으로 필터…">
  </header>
  <main id="main">
    {% for v in videos %}
    <section class="video" data-key="{{ v.key }}" data-selected="{{ v.selected }}" data-title="{{ v.title|e }}">
      <div class="left">
        <h2>{{ v.title or v.key }} <span class="vkey">{{ v.key }}</span></h2>
        <div class="cands">
          {% for c in v.candidates %}
          <button class="cand {{ 'sel' if c == v.selected else '' }}" data-file="{{ c }}" title="{{ c }}">
            <img loading="lazy" src="/preview?file={{ c|urlencode }}" alt="">
            <span class="tag">{{ loop.index }}</span>
          </button>
          {% endfor %}
        </div>
      </div>
      <div class="side">
        <div class="pvwrap"><span class="hint">후보를 클릭하면 미리보기</span></div>
        <label>제목</label>
        <textarea class="title" rows="2">{{ v.title }}</textarea>
        <label>설명</label>
        <input type="text" class="desc" value="{{ v.desc }}">
        <div class="actbar">
          <button class="btn primary save" disabled>저장</button>
          <button class="btn dl" disabled>다운로드</button>
          <span class="status"></span>
        </div>
      </div>
    </section>
    {% endfor %}
  </main>

<script>
const CONFIG = {{ config_json | safe }};
const CROPSET = {{ cropset_json | safe }};
const enc = v => encodeURIComponent(v || "");
const fullCache = new Map();
function loadFull(file){
  if (fullCache.has(file)) return Promise.resolve(fullCache.get(file));
  return new Promise((res, rej) => { const img = new Image();
    img.onload = () => { fullCache.set(file, img); res(img); };
    img.onerror = () => rej(new Error("load fail "+file)); img.src = `/image?file=${enc(file)}`; });
}
function rgba(a, al=1){ return (Array.isArray(a)&&a.length>=3)?`rgba(${a[0]},${a[1]},${a[2]},${al})`:`rgba(255,255,255,${al})`; }
function buildFont(w,s,fam){ const f = fam?fam.split(",").map(x=>x.trim().includes(" ")?`"${x.trim()}"`:x.trim()).join(","):"system-ui"; return `${w||400} ${s||48}px ${f}`; }
function parseFontSize(f){ const m=/([0-9]+(?:\.[0-9]+)?)px/.exec(f); return m?parseFloat(m[1]):48; }
function drawSpaced(ctx,t,x,y,o){ if(!t)return; ctx.font=o.font; ctx.fillStyle=o.fillStyle; ctx.strokeStyle=o.strokeStyle; ctx.lineWidth=o.lineWidth; ctx.lineJoin="round"; ctx.textBaseline="alphabetic"; let c=x; const sp=Math.max(0,o.charSpacing||0); for(const ch of t){ const m=ctx.measureText(ch); if(o.lineWidth>0)ctx.strokeText(ch,c,y); ctx.fillText(ch,c,y); c+=(m.width||0)+sp; } }
function measureBlock(ctx,lines,font,gap){ if(!lines.length)return{baselines:[],totalHeight:0}; ctx.font=font; const bl=[]; let cur=0; const fb=parseFontSize(font); lines.forEach((ln,i)=>{ const m=ctx.measureText(ln); let a=m.actualBoundingBoxAscent||0,d=m.actualBoundingBoxDescent||0; if(!a&&!d){a=fb*0.8;d=fb*0.2;} const h=a+d||fb; bl.push(cur+h-d); cur+=h; if(i<lines.length-1)cur+=gap; }); return {baselines:bl,totalHeight:cur}; }
function baseRect(iw, ih, W, H){ const ar=iw/ih, tar=W/H; let sw,sh,sx,sy;
  if(ar>tar){ sh=ih; sw=sh*tar; sx=(iw-sw)/2; sy=0; } else { sw=iw; sh=sw/tar; sx=0; sy=(ih-sh)/2; }
  return {sw,sh,sx,sy}; }
async function renderCanvas(canvas, file, title, desc, crop){
  const img = await loadFull(file); const ctx = canvas.getContext('2d');
  const W = Number(CONFIG.target_width)||img.width, H = Number(CONFIG.target_height)||img.height;
  canvas.width=W; canvas.height=H; ctx.clearRect(0,0,W,H);
  ctx.save(); ctx.filter='contrast(1.04) saturate(1.08)';
  { const b=baseRect(img.width,img.height,W,H);
    const z=(crop&&crop.zoom)||1, px=(crop&&crop.px!=null)?crop.px:0.5, py=(crop&&crop.py!=null)?crop.py:0.35;
    const sw=b.sw/z, sh=b.sh/z, sx=b.sx+(b.sw-sw)*px, sy=b.sy+(b.sh-sh)*py;
    ctx.drawImage(img, sx,sy,sw,sh, 0,0,W,H); }
  ctx.restore();
  // darken bottom band behind text for legibility
  const g = ctx.createLinearGradient(0, H*0.45, 0, H);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(0.6,'rgba(0,0,0,0.35)'); g.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle=g; ctx.fillRect(0, H*0.45, W, H*0.55);
  const tLines = title?title.split(/\r?\n/):[], dLines = desc?desc.split(/\r?\n/):[];
  const fill=rgba(CONFIG.fill_color,1), stroke=rgba(CONFIG.stroke_color,1), lw=Number(CONFIG.stroke_width)||0;
  const pl=Number(CONFIG.padding_left)||48, pb=Number(CONFIG.padding_bottom)||48, ls=Number(CONFIG.line_spacing)||12, cs=Number(CONFIG.char_spacing)||0;
  const tFont=buildFont(CONFIG.title_font_weight,CONFIG.title_font_size,CONFIG.title_font_name);
  const dFont=buildFont(CONFIG.desc_font_weight,CONFIG.desc_font_size,CONFIG.desc_font_name);
  const dB=measureBlock(ctx,dLines,dFont,ls), tB=measureBlock(ctx,tLines,tFont,ls);
  const gap=(dLines.length&&tLines.length)?ls:0; const bTop=(H-pb)-(dB.totalHeight+gap+tB.totalHeight);
  const oT={font:tFont,fillStyle:fill,strokeStyle:stroke,lineWidth:lw,charSpacing:cs};
  const oD={font:dFont,fillStyle:fill,strokeStyle:stroke,lineWidth:lw,charSpacing:cs};
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.55)'; ctx.shadowBlur=Math.round(H*0.013); ctx.shadowOffsetX=0; ctx.shadowOffsetY=Math.round(H*0.004);
  dLines.forEach((ln,i)=>drawSpaced(ctx,ln,pl,bTop+dB.baselines[i],oD));
  if(tLines.length){ const off=bTop+dB.totalHeight+gap; tLines.forEach((ln,i)=>drawSpaced(ctx,ln,pl,off+tB.baselines[i],oT)); }
  ctx.restore();
}
function updateDone(){ document.getElementById('done').textContent = document.querySelectorAll('.video[data-selected]:not([data-selected=""])').length; }
function initVideo(sec){
  const pv=sec.querySelector('.pvwrap'), titleEl=sec.querySelector('.title'), descEl=sec.querySelector('.desc'),
        saveBtn=sec.querySelector('.save'), dlBtn=sec.querySelector('.dl'), status=sec.querySelector('.status');
  const key=sec.dataset.key;
  const crop=Object.assign({zoom:1,px:0.5,py:0.35}, CROPSET[key]||{});
  let canvas=null, rendered=false, raf=0, pt=0, drag=null;
  function ensure(){ if(!canvas){ canvas=document.createElement('canvas'); pv.innerHTML=''; pv.appendChild(canvas);} return canvas; }
  async function preview(){ const file=sec.dataset.selected; if(!file)return; await renderCanvas(ensure(),file,titleEl.value.trim(),descEl.value.trim(),crop); rendered=true; saveBtn.disabled=false; dlBtn.disabled=false; pv.style.cursor=crop.zoom>1?'grab':'default'; }
  function redraw(){ if(raf||!sec.dataset.selected||!canvas) return; raf=requestAnimationFrame(()=>{ raf=0; renderCanvas(canvas,sec.dataset.selected,titleEl.value.trim(),descEl.value.trim(),crop); }); }
  function persist(){ clearTimeout(pt); pt=setTimeout(()=>{ fetch('/cropset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,zoom:crop.zoom,px:crop.px,py:crop.py})}).catch(()=>{}); },350); }
  function fname(){ const t=(titleEl.value.trim()||key).replace(/[\/\\:*?"<>|]+/g,' ').slice(0,80); return t+'.jpg'; }
  pv.addEventListener('wheel', e=>{ if(!sec.dataset.selected) return; e.preventDefault();
    const r=pv.getBoundingClientRect(); const cu=(e.clientX-r.left)/r.width, cv=(e.clientY-r.top)/r.height;
    const o=crop.zoom; let s=-e.deltaY*0.0008; s=Math.max(-0.04,Math.min(0.04,s)); let z=Math.max(1,Math.min(3,o*(1+s)));
    if(z>1){ const pbx=(1-1/o)*crop.px+cu/o, pby=(1-1/o)*crop.py+cv/o;
      crop.px=Math.max(0,Math.min(1,(pbx-cu/z)/(1-1/z))); crop.py=Math.max(0,Math.min(1,(pby-cv/z)/(1-1/z))); }
    else { crop.px=0.5; crop.py=0.35; }
    crop.zoom=z; pv.style.cursor=z>1?'grab':'default'; redraw(); persist();
  }, {passive:false});
  pv.addEventListener('mousedown', e=>{ if(!sec.dataset.selected||crop.zoom<=1) return; e.preventDefault(); drag={x:e.clientX,y:e.clientY,px:crop.px,py:crop.py}; pv.style.cursor='grabbing'; });
  window.addEventListener('mousemove', e=>{ if(!drag) return; const r=pv.getBoundingClientRect(); const k=(1/crop.zoom)/(1-1/crop.zoom);
    crop.px=Math.max(0,Math.min(1,drag.px-((e.clientX-drag.x)/r.width)*k));
    crop.py=Math.max(0,Math.min(1,drag.py-((e.clientY-drag.y)/r.height)*k)); redraw(); });
  window.addEventListener('mouseup', ()=>{ if(drag){ drag=null; pv.style.cursor=crop.zoom>1?'grab':'default'; persist(); } });
  function select(file,btn){ sec.querySelectorAll('.cand').forEach(b=>b.classList.remove('sel')); if(btn)btn.classList.add('sel'); sec.dataset.selected=file; updateDone(); preview();
    fetch('/select',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({file})}).catch(()=>{}); }
  sec.querySelectorAll('.cand').forEach(btn=>btn.addEventListener('click',()=>select(btn.dataset.file,btn)));
  function saveText(){ fetch('/savetext',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,title:titleEl.value.trim(),desc:descEl.value.trim()})})
    .then(r=>{ if(r.ok){ status.innerHTML='<span class="ok">✓ 자동저장</span>'; setTimeout(()=>{ if(status.textContent.includes('자동저장')) status.textContent=''; },1500); } }).catch(()=>{}); }
  let t; const onEdit=()=>{ clearTimeout(t); t=setTimeout(()=>{ if(sec.dataset.selected) preview(); saveText(); },400); };
  titleEl.addEventListener('input',onEdit); descEl.addEventListener('input',onEdit);
  dlBtn.addEventListener('click', async()=>{ if(!sec.dataset.selected) return; if(!rendered) await preview();
    canvas.toBlob(b=>{ const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=fname(); document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }, 'image/jpeg', 0.92); });
  saveBtn.addEventListener('click',async()=>{ const file=sec.dataset.selected; if(!file)return; if(!rendered) await preview();
    status.textContent='저장 중…';
    try{ const r=await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({file,title:titleEl.value.trim(),desc:descEl.value.trim(),imageData:canvas.toDataURL('image/jpeg',0.92)})});
      if(!r.ok) throw new Error(r.status); status.innerHTML='<span class="ok">✓ 저장됨</span>';
      setTimeout(()=>{ if(status.textContent.includes('저장됨')) status.textContent=''; },2500);
    }catch(e){ status.textContent='오류'; console.error(e); } });
  sec.__preview=preview; sec.__hasSel=!!sec.dataset.selected;
}
const io=new IntersectionObserver((es)=>{ for(const e of es){ if(e.isIntersecting && e.target.__hasSel && !e.target.__shown){ e.target.__shown=true; e.target.__preview(); } } },{rootMargin:'400px'});
document.querySelectorAll('.video').forEach(sec=>{ initVideo(sec); io.observe(sec); });
updateDone();
if (document.fonts && document.fonts.load) { document.fonts.load("630 96px 'Pretendard Variable'"); document.fonts.load("480 72px 'Pretendard Variable'"); }
document.getElementById('filter').addEventListener('input',(e)=>{ const q=e.target.value.toLowerCase();
  document.querySelectorAll('.video').forEach(sec=>{ sec.style.display=(sec.dataset.title+' '+sec.dataset.key).toLowerCase().includes(q)?'':'none'; }); });
</script>
</body>
</html>
